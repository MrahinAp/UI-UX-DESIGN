<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi</title>
    <link rel="stylesheet" href="styleRegis.css">
</head>
<body>

    <div class="regis_container">
        <div class="logo">
            <img src="Logo_Unpas_bANDUNG-777x437.png" alt="Logo">
        </div>

        <h2>Registrasi Akun</h2>

        <form action="#" method="post" class="form-grid">

            <input type="text" name="nama_lengkap" placeholder="Nama Lengkap" required>
            <input type="text" name="username" placeholder="Username" required>

            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <input type="password" name="konfirmasi_password" placeholder="Konfirmasi Password" required>

            <select name="jenis_kelamin" required>
                <option value="">Jenis Kelamin</option>
                <option value="laki-laki">Laki-Laki</option>
                <option value="perempuan">Perempuan</option>
            </select>

            <input type="date" name="tanggal_lahir" required>
            <input type="text" name="alamat" placeholder="Alamat" required>

            <input type="number" name="no_hp" placeholder="No HP" required>
            <input type="text" name="hobi" placeholder="Hobi" required>

            <input type="file" name="foto" required>

            <a href="login.html" class="btn-daftar">Daftar</a>
            <br>
            <br>
            <button type="reset">Reset</button>
            

        </form>

        <p class="registrasi">
            Sudah punya akun?
            <a href="login.html">Login</a>
        </p>
    </div>

</body>
</html>
